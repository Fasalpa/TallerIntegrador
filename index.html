<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="contenedor">
      <h1>Task Manager</h1>

      <div id="contadorTareas">
        <p><span>0</span> de <span>0</span> tareas completadas</p>
      </div>

      <input type="text" id="nuevaTarea" placeholder="Escribe una tarea..." />
      <span id="mensajeError" style="display: none"
        >⚠️ El campo está vacío.</span
      >

      <select name="tareas" id="listaCategorias">
        <option value="" disabled selected>---Categoria---</option>
        <option value="estudio">📒 Estudio</option>
        <option value="personal">🧘🏼‍♂️ Personal</option>
        <option value="trabajo">🖥️ Trabajo</option>
        <option value="urgente">⚡ Urgente</option>
        <option value="otra">🕳️ Otra</option>
      </select>
      <span id="mensajeCategoria" style="display: none"
        >⚠️ Seleccione primero una categoría.</span
      >

      <input
        id="nuevaCategoria"
        type="text"
        autocapitalize="sentences"
        style="display: none"
        placeholder="Escriba nueva categoría"
      />
      <span id="mensajeInput" style="display: none"
        >⚠️ Escriba la categoría primero.</span
      >
      <button id="btnAgregar" onclick="agregarTarea()">Agregar tarea +</button>

      <div id="acciones">
        <button id="btnLimpiar">🧹 Limpiar tareas completadas</button>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
